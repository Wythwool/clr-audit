name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore src/clr-audit.csproj
      - name: Build
        run: dotnet build src/clr-audit.csproj -c Release --no-restore
      - name: Pack
        run: dotnet pack src/clr-audit.csproj -c Release --no-build -o artifacts/package
      - name: Test
        run: python tests/run_tests.py
